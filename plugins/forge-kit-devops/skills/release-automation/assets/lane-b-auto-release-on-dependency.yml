# Auto-release on dependency update (lane B) — when a dependency-bot update reaches the
# production branch and CI is green, auto-patch the version, tag, and release. This is the ONE
# auto-bump lane that is safe by construction: the author is a bot (no human to make the bump
# decision) and the impact is bounded (consume an upstream release -> PATCH). Human feature PRs
# go through the lane-A gate instead, where a person declares patch/minor/major.
#
# Installed by the forge-kit `release-automation` skill when a dep bot is present
# (.github/dependabot.yml or renovate.json). forge-adapt tailors: the CI workflow name, the
# production branch, the version source, the bot logins, and the bump command.
#
# NON-NEGOTIABLE properties baked in (see references/github-token-gotcha.md):
#   * workflow_run gated on CI success + checkout the validated head_sha — never release red code
#   * a GitHub App token (or PAT) so the pushed tag TRIGGERS the downstream publish workflow
#     (a tag pushed with the default GITHUB_TOKEN does NOT trigger one) — which forfeits the
#     default token's free recursion immunity, hence:
#   * a recursion guard (skip our own bump commit) + concurrency — or this re-triggers itself
#   * an actor + diff-scope gate — only bot-authored, manifest/lockfile-only changes auto-release;
#     anything else (including dependency MAJORS) falls through to the lane-A gate

name: Auto-release on dependency update

on:
  workflow_run:
    workflows: ["CI"]            # forge-adapt: the EXACT name: of the CI workflow that validates the branch
    types: [completed]
    branches: [main]             # forge-adapt: the production branch

permissions:
  contents: write

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false      # never cancel a half-finished tag/release

jobs:
  auto-release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      VERSION_SOURCE: file       # forge-adapt: file | node | python | cargo | cmd
      VERSION_FILE: VERSION
      TAG_GLOB: 'v*'
      TAG_PREFIX: v
      BOT_LOGINS: "dependabot[bot] renovate[bot]"   # forge-adapt: the dep bot's commit/actor logins
      # forge-adapt: globs that count as a dependency-only change
      DEP_PATHS: "package.json package-lock.json yarn.lock pnpm-lock.yaml requirements*.txt poetry.lock Cargo.lock go.sum"
    steps:
      - name: Mint a token that CAN trigger downstream workflows
        id: token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
        # forge-adapt: no App available? Swap this for a PAT secret and use it below. The default
        # GITHUB_TOKEN will NOT trigger the publish workflow on the pushed tag.

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}   # release exactly what CI validated
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.token.outputs.token }}

      - name: Recursion guard — skip our own release bump commit
        id: guard
        run: |
          msg=$(git log -1 --pretty=%s)
          if printf '%s' "$msg" | grep -q '^chore(release): bump version'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::own bump commit — nothing to do."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Gate — bot author + dependency-only diff
        id: scope
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          author=$(git log -1 --pretty='%an')
          actor='${{ github.event.workflow_run.actor.login }}'
          is_bot=false
          for b in $BOT_LOGINS; do
            if [ "$author" = "$b" ] || [ "$actor" = "$b" ]; then is_bot=true; fi
          done
          changed=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git show --name-only --pretty='' HEAD)
          only_deps=true
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            m=false
            for g in $DEP_PATHS; do case "$f" in $g) m=true;; esac; done
            $m || only_deps=false
          done <<< "$changed"
          if [ "$is_bot" = true ] && [ "$only_deps" = true ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::not a bot-authored dependency-only change (bot=$is_bot deps-only=$only_deps) — leaving it to the lane-A gate."
          fi

      - name: Decide + bump
        id: decide
        if: steps.guard.outputs.skip != 'true' && steps.scope.outputs.ok == 'true'
        run: |
          set -euo pipefail
          verdict=$(bash scripts/version-lib.sh)
          case "$verdict" in
            behind)
              echo "::error::version is behind the latest release — refusing to publish a regression."; exit 1 ;;
            ahead)
              v=$(bash -c 'source scripts/version-lib.sh; read_version')
              echo "version=$v" >> "$GITHUB_OUTPUT" ;;
            equal|first-release)
              next=$(bash -c 'source scripts/version-lib.sh; next_patch')
              # forge-adapt: for non-file sources replace this write with the project's bump,
              # e.g.  npm version "$next" --no-git-tag-version  (node). File-mode default:
              printf '%s\n' "$next" > "$VERSION_FILE"
              git config user.name 'github-actions[bot]'
              git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
              git add -A
              git commit -m "chore(release): bump version to $next"
              git push origin "HEAD:${{ github.event.workflow_run.head_branch }}"
              echo "version=$next" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Tag + release
        if: steps.guard.outputs.skip != 'true' && steps.scope.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          set -euo pipefail
          v='${{ steps.decide.outputs.version }}'
          [ -n "$v" ] || { echo "::error::no version decided"; exit 1; }
          git tag -a "${TAG_PREFIX}${v}" -m "Release ${TAG_PREFIX}${v}"
          git push origin "${TAG_PREFIX}${v}"
          gh release create "${TAG_PREFIX}${v}" --title "${TAG_PREFIX}${v}" --generate-notes
