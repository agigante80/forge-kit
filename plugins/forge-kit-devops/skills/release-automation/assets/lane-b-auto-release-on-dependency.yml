# Auto-release on dependency update (lane B) — when a dependency-bot update reaches the production
# branch and CI is green, auto-patch the version, tag, and release. The ONE auto-bump lane that is
# safe by construction: the author is a bot (no human to make the bump call) and the impact is
# bounded (consume an upstream release -> PATCH). Human feature PRs go through the lane-A gate.
#
# The release MECHANICS live in scripts/release-run.sh (shared with lane C) so a fix lands once:
# recursion guard, the dependency scope gate (REQUIRE_DEP_SCOPE=1 below), decide+bump, idempotent
# tag+release, the App-token/recursion/push-race handling. See references/github-token-gotcha.md.
#
# Installed by the forge-kit `release-automation` skill when a dep bot is present (.github/
# dependabot.yml or renovate.json). forge-adapt tailors: the CI workflow name, the production
# branch, the version source, the bot logins, and the dep-path globs.

name: Auto-release on dependency update

on:
  workflow_run:
    workflows: ["CI"]            # forge-adapt: the EXACT name: of the CI workflow that validates the branch
    types: [completed]
    branches: [main]             # forge-adapt: the production branch

permissions:
  contents: write

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  auto-release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      VERSION_SOURCE: file       # forge-adapt: file | node | python | cargo | cmd  (tag-derived git -> use lane C)
      VERSION_FILE: VERSION
      TAG_GLOB: 'v*'
      TAG_PREFIX: v
      BRANCH: ${{ github.event.workflow_run.head_branch }}
      REQUIRE_DEP_SCOPE: '1'     # only release a bot-authored, dependency-only change
      BOT_LOGINS: "dependabot[bot] renovate[bot]"   # forge-adapt: the dep bot's commit/actor logins
      DEP_PATHS: "package.json package-lock.json yarn.lock pnpm-lock.yaml requirements*.txt poetry.lock Cargo.lock go.sum"
      ACTOR: ${{ github.event.workflow_run.actor.login }}
    steps:
      - name: Mint a token that CAN trigger downstream workflows
        id: token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
        # forge-adapt: no App available? Swap for a PAT secret. The default GITHUB_TOKEN will NOT
        # trigger the publish workflow on the pushed tag.

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}   # release exactly what CI validated
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.token.outputs.token }}

      - name: Auto-release
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: bash scripts/release-run.sh   # forge-adapt: adjust the path if installed elsewhere
