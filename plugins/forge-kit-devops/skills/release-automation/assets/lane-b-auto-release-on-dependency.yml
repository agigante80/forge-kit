# Auto-release on dependency update (lane B) — when a dependency-bot update reaches the
# production branch and CI is green, auto-patch the version, tag, and release. This is the ONE
# auto-bump lane that is safe by construction: the author is a bot (no human to make the bump
# decision) and the impact is bounded (consume an upstream release -> PATCH). Human feature PRs
# go through the lane-A gate instead, where a person declares patch/minor/major.
#
# Installed by the forge-kit `release-automation` skill when a dep bot is present
# (.github/dependabot.yml or renovate.json). forge-adapt tailors: the CI workflow name, the
# production branch, the version source, the bot logins, and the bump command.
#
# NON-NEGOTIABLE properties baked in (see references/github-token-gotcha.md):
#   * workflow_run gated on CI success + checkout the validated head_sha — never release red code
#   * a GitHub App token (or PAT) so the pushed tag TRIGGERS the downstream publish workflow
#     (a tag pushed with the default GITHUB_TOKEN does NOT trigger one) — which forfeits the
#     default token's free recursion immunity, hence:
#   * a recursion guard on a RESERVED bump subject (distinct from the `release` skill's human
#     subject, so a human release is never swallowed) + concurrency
#   * an actor + diff-scope gate — only bot-authored, manifest/lockfile-only changes auto-release;
#     anything else (including dependency MAJORS) falls through to the lane-A gate

name: Auto-release on dependency update

on:
  workflow_run:
    workflows: ["CI"]            # forge-adapt: the EXACT name: of the CI workflow that validates the branch
    types: [completed]
    branches: [main]             # forge-adapt: the production branch

permissions:
  contents: write

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false      # never cancel a half-finished tag/release

jobs:
  auto-release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      VERSION_SOURCE: file       # forge-adapt: file | node | python | cargo | cmd
      VERSION_FILE: VERSION
      TAG_GLOB: 'v*'
      TAG_PREFIX: v
      BOT_LOGINS: "dependabot[bot] renovate[bot]"   # forge-adapt: the dep bot's commit/actor logins
      # forge-adapt: globs that count as a dependency-only change (matched against full path AND basename)
      DEP_PATHS: "package.json package-lock.json yarn.lock pnpm-lock.yaml requirements*.txt poetry.lock Cargo.lock go.sum"
      BRANCH: ${{ github.event.workflow_run.head_branch }}
    steps:
      - name: Mint a token that CAN trigger downstream workflows
        id: token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
        # forge-adapt: no App available? Swap this for a PAT secret and use it below. The default
        # GITHUB_TOKEN will NOT trigger the publish workflow on the pushed tag.

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}   # release exactly what CI validated
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.token.outputs.token }}

      - name: Recursion guard — skip our own auto-bump commit
        id: guard
        run: |
          msg=$(git log -1 --pretty=%s)
          # Reserved subject for THIS lane's bot commit. Deliberately distinct from the `release`
          # skill's human `chore(release): bump version to X.Y.Z`, so a human release is never
          # mistaken for the bot's own commit and silently skipped.
          if printf '%s' "$msg" | grep -q '^chore(release): automated version bump'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::own auto-bump commit — nothing to do."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Gate — dependency-bot author + dependency-only diff
        id: scope
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          # Inspect the commits this push INTRODUCED (first-parent range), so a bot update is caught
          # whether it was squash-merged (HEAD author = bot) OR merge-committed (the merge commit's
          # author is the human who clicked merge, but the bot's commits are in HEAD~1..HEAD).
          if git rev-parse -q --verify HEAD~1 >/dev/null 2>&1; then
            authors=$(git log --format='%an' HEAD~1..HEAD)
            changed=$(git diff --name-only HEAD~1 HEAD)
          else
            authors=$(git log -1 --format='%an')
            changed=$(git show --name-only --pretty='' HEAD)
          fi
          actor='${{ github.event.workflow_run.actor.login }}'
          set -f                                   # disable globbing: keep [bot] and *.txt literal
          is_bot=false
          for b in $BOT_LOGINS; do
            printf '%s\n' "$authors" | grep -qxF "$b" && is_bot=true
            [ "$actor" = "$b" ] && is_bot=true
          done
          only_deps=true
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            m=false
            for g in $DEP_PATHS; do
              case "$f" in $g) m=true;; esac          # full path
              case "${f##*/}" in $g) m=true;; esac    # or basename (monorepo subdirs)
            done
            $m || only_deps=false
          done <<< "$changed"
          set +f
          if [ "$is_bot" = true ] && [ "$only_deps" = true ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::not a bot-authored dependency-only change (bot=$is_bot deps-only=$only_deps) — leaving it to the lane-A gate."
          fi

      - name: Decide + bump
        id: decide
        if: steps.guard.outputs.skip != 'true' && steps.scope.outputs.ok == 'true'
        run: |
          set -euo pipefail
          verdict=$(bash scripts/version-lib.sh)
          case "$verdict" in
            behind)
              echo "::error::version is behind the latest release — refusing to publish a regression."; exit 1 ;;
            ahead|first-release)
              # already at (ahead) or establishing (first-release) the version to ship — tag it
              # as-is, no bump. first-release must NOT be patched, or the initial version is skipped.
              v=$(bash -c 'source scripts/version-lib.sh; read_version')
              echo "version=$v" >> "$GITHUB_OUTPUT" ;;
            equal)
              next=$(bash -c 'source scripts/version-lib.sh; next_patch')
              # forge-adapt: for non-file sources replace this write with the project's bump,
              # e.g.  npm version "$next" --no-git-tag-version  (node). File-mode default:
              printf '%s\n' "$next" > "$VERSION_FILE"
              git config user.name 'github-actions[bot]'
              git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
              git add -A
              git commit -m "chore(release): automated version bump to $next"
              # Re-sync onto the branch tip in case it advanced since CI validated head_sha, so the
              # push is a fast-forward — never --force, never clobber a concurrent commit. A genuine
              # concurrent bump surfaces as a rebase conflict (fail loud) rather than a lost release.
              git fetch origin "$BRANCH"
              git rebase FETCH_HEAD
              git push origin "HEAD:$BRANCH"
              echo "version=$next" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Tag + release (idempotent)
        if: steps.guard.outputs.skip != 'true' && steps.scope.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          set -euo pipefail
          v='${{ steps.decide.outputs.version }}'
          [ -n "$v" ] || { echo "::error::no version decided"; exit 1; }
          tag="${TAG_PREFIX}${v}"
          # Idempotent: a prior run may have died after pushing the tag but before the release.
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "::notice::tag $tag already exists — not re-tagging."
          else
            git tag -a "$tag" -m "Release $tag"
            git push origin "$tag"
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "::notice::release $tag already exists — nothing to publish."
          else
            gh release create "$tag" --title "$tag" --generate-notes
          fi
