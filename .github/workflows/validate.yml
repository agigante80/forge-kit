name: Validate

# Governance CI for the forge-kit marketplace. Makes the version-marker + plugin-structure
# discipline authoritative (a required check), rather than relying on the opt-in local
# .githooks/pre-commit. Modelled on anthropics/claude-plugins-official's validate-plugins.
#
# Runs on EVERY pull_request (no path filter) on purpose: a path-filtered required check
# never reports on PRs that miss the paths, leaving them blocked forever. The job is fast,
# so running it unconditionally is the cost of being a reliable required status check.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Structural validation (plugin.json + marketplace + version markers)
        run: bash scripts/validate-plugins.sh

      # Anti-drift lock: the work issue-templates must all share one template-version, so
      # the ticket-gate version check stays correct across ticket types.
      - name: Template version lockstep
        run: bash scripts/check-template-lockstep.sh

      # Behavioural gate for the one component that HAS a testable contract. Hooks are the
      # only forge-kit component that can be exercised in isolation: JSON in, decision out.
      - name: Hook contract tests
        run: python3 scripts/test-hooks.py

      - name: Template lockstep guard tests
        run: bash scripts/test-template-lockstep.sh

      - name: Version-bump discipline (changed component must bump its marker)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: bash scripts/check-version-bump.sh "origin/$BASE_REF"

      # Advisory only: layer in the official validator when the CLI is available. Never
      # fails the build (continue-on-error) - our own validate-plugins.sh is the gate.
      - name: Official validation (claude plugin validate, advisory)
        continue-on-error: true
        run: |
          if ! npm install -g @anthropic-ai/claude-code >/dev/null 2>&1; then
            echo "claude CLI could not be installed; skipping advisory validation."; exit 0
          fi
          if claude plugin validate --help >/dev/null 2>&1; then
            claude plugin validate . || echo "claude plugin validate reported issues (advisory)."
          else
            echo "claude plugin validate subcommand unavailable in this CLI version; skipping."
          fi
